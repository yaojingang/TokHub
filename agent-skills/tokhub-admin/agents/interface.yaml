interface:
  display_name: "TokHub Admin"
  short_description: "Operate TokHub admin workflows through scoped admin-agent tokens"
  default_prompt: "Use $tokhub-admin to inspect TokHub production health, run a safe admin operation, and verify audit metadata."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
    - "vscode"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
    vscode: "agent-skills-source-with-vscode-notes"
