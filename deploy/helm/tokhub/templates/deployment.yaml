{{- range $role, $cfg := .Values.roles }}
{{- if $cfg.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tokhub.fullname" $ }}-{{ $role }}
  labels:
    {{- include "tokhub.labels" $ | nindent 4 }}
    tokhub.io/role: {{ $role | quote }}
spec:
  replicas: {{ $cfg.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/name: {{ include "tokhub.name" $ }}
      tokhub.io/role: {{ $role | quote }}
  template:
    metadata:
      labels:
        {{- include "tokhub.labels" $ | nindent 8 }}
        tokhub.io/role: {{ $role | quote }}
    spec:
      containers:
        - name: tokhub
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "tokhub.fullname" $ }}-config
            - secretRef:
                name: {{ include "tokhub.fullname" $ }}-secret
          env:
            - name: TOKHUB_ROLE
              value: {{ $role | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
---
{{- end }}
{{- end }}
